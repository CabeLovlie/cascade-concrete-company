<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8" /><title>Forms</title></head>
  <body>
    <!-- Hidden form for Netlify build-time detection -->
    <form name="cascade-estimate" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="cascade-estimate" />
      <input name="name" type="text" />
      <input name="phone" type="tel" />
      <input name="email" type="email" />
      <input name="city" type="text" />
      <input name="project-type" type="text" />
      <textarea name="details"></textarea>
    </form>
  </body>
</html>
